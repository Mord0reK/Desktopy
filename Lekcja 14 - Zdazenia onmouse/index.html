<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zdarzenia onmouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Zadanie 1</h1>
    <div onmouseover="ramkawl()" onmouseout="ramkawyl()" id="zad1">
        <img src="obrazek.png" alt="obrazek">
    </div>
    <hr>
    <h1>Zadanie 2</h1>
    <div onmouseover="przyciskwl()" onmouseout="przyciskwyl()" id="zad2">
        <input type="button" value="przycisk" id="przycisk">
    </div>
    <hr>
    <h1>Zadanie 3</h1>
    <div id="zad3">
        <img src="obrazek1.svg" onmouseover="powieksz1()" onmouseout="pomniejsz1()" alt="obrazek1" id="obrazek1">
        <img src="obrazek2.svg" onmouseover="powieksz2()" onmouseout="pomniejsz2()" alt="obrazek2" id="obrazek2">
        <img src="obrazek3.svg" onmouseover="powieksz3()" onmouseout="pomniejsz3()" alt="obrazek3" id="obrazek3">
    </div>
    <script src="script.js"></script>
</body>
</html>
